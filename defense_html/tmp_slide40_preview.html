<!doctype html>
<html><head><meta charset="utf-8"><title>slide40 preview</title>
<link rel="stylesheet" href="deck.css">

  .frame{width:1600px;height:900px;background:#fff;box-shadow:0 0 0 1px #888;margin:20px auto;}

});
</script>
